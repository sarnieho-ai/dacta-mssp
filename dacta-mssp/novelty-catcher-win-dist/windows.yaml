# ============================================================
# DACTA Novelty Catcher -- Windows Configuration Template
# Auto-generated by SIEMLess
# ============================================================
#
# Copy this file to: C:\ProgramData\DACTA\Novelty-Catcher\config\config.yaml
# Then edit the values below for your environment.
#
# Environment variables (set in env.cmd):
#   ELASTIC_URL      - Your Elasticsearch URL
#   ELASTIC_API_KEY  - API key for Elasticsearch access
#
# ============================================================

agent:
  name: "novelty-catcher-CLIENT_NAME"
  version: "2.0.0"
  log_level: "INFO"
  log_file: "C:\\ProgramData\\DACTA\\Novelty-Catcher\\logs\\novelty-catcher.log"
  state_dir: "C:\\ProgramData\\DACTA\\Novelty-Catcher\\state"

inputs:
  syslog:
    enabled: true
    protocol: "udp"
    host: "0.0.0.0"
    port: 5514
    buffer_size: 65536
    forward_to:
      enabled: true
      host: "127.0.0.1"
      port: 514

  file:
    enabled: false
    paths:
      - "C:\\ProgramData\\Elastic\\Agent\\data\\*.ndjson"
    poll_interval_ms: 500

  elastic:
    enabled: true
    url: "${ELASTIC_URL}"
    api_key: "${ELASTIC_API_KEY}"
    # Indices are auto-discovered from SIEMLess DB on startup.
    # Only set this to override or restrict which indices are polled.
    # Leave empty to let the catcher discover indices from client_log_sources.
    indices: []
    poll_interval_seconds: 60
    lookback_minutes: 5
    batch_size: 1000

detection:
  baseline:
    learning_period_hours: 168
    rolling_window_hours: 24
    min_samples: 50
  scoring:
    novelty_threshold: 0.75
    high_confidence_threshold: 0.90
    cooldown_minutes: 5

  # Feature extraction schemas are pulled dynamically from SIEMLess DB
  # based on the org's log sources and connectors. No need to hardcode.
  # The catcher discovers field mappings at startup and refreshes every
  # sync_interval_minutes from /api/novelty-catcher?action=feature_schema.
  features:
    auto_discover: true
    sync_interval_minutes: 60
    # Fallback fields used when a log source has no schema in SIEMLess DB
    fallback:
      categorical: ["event.action", "event.category", "event.module", "event.dataset", "log.level"]
      ip_fields: ["source.ip", "destination.ip"]

  source_detection:
    enabled: true
    alert_on_new_source: true
    auto_learn_new_sources: true

outputs:
  elastic:
    enabled: true
    url: "${ELASTIC_URL}"
    api_key: "${ELASTIC_API_KEY}"
    index: "novelty-alerts-CLIENT_NAME"

  siemless:
    enabled: true
    url: "https://dacta-siemless.vercel.app"
    endpoint: "/api/novelty-catcher"
    # Auth token is auto-generated at catcher registration.
    # The catcher_id is used for authentication against the API.

  file:
    enabled: true
    path: "C:\\ProgramData\\DACTA\\Novelty-Catcher\\outputs\\novelty_alerts.ndjson"
    rotate_size_mb: 50

performance:
  workers: 2
  queue_size: 10000
  batch_process_size: 100
  memory_limit_mb: 512
